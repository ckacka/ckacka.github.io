<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI助手 · 接入DeepSeek (可配置密钥)</title>
    <link rel="stylesheet" href="https://unpkg.com/tdesign-vue-next/dist/tdesign.min.css" />
    <style>
        /* 基础重置 & 全局背景 */
        body {
            margin: 0;
            padding: 0;
            background-color: var(--td-bg-color-page);
            font-family: var(--td-font-family);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 主容器：自适应大屏 */
        #app {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            max-height: 900px;
            border-radius: var(--td-radius-large);
            box-shadow: var(--td-shadow-3);
            overflow: hidden;
            background-color: var(--td-bg-color-container);
            margin: 20px;
        }

        @media (max-width: 640px) {
            #app {
                height: 100vh;
                max-height: none;
                border-radius: 0;
                margin: 0;
            }
        }

        .flex-column-layout {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .grow-content {
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        .chat-scroll-area {
            height: 100%;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-color: var(--td-bg-color-container);
            box-sizing: border-box;
        }

        .message-row {
            display: flex;
            align-items: flex-start;
            width: 100%;
        }

        .message-row.user {
            flex-direction: row-reverse;
        }

        .message-bubble {
            max-width: min(70%, 800px);
            padding: 12px 18px;
            border-radius: var(--td-radius-default);
            font-size: 15px;
            line-height: 1.6;
            word-break: break-word;
            margin: 0 12px;
            box-shadow: var(--td-shadow-1);
        }

        .user .message-bubble {
            background-color: var(--td-brand-color);
            color: var(--td-text-color-anti);
            border-top-right-radius: 0;
        }

        .assistant .message-bubble {
            background-color: var(--td-bg-color-secondarycontainer);
            color: var(--td-text-color-primary);
            border-top-left-radius: 0;
        }

        .input-area {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            background-color: var(--td-bg-color-container);
            border-top: 1px solid var(--td-component-border);
            flex-wrap: nowrap;
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 100%;
            padding: 0 24px;
            box-sizing: border-box;
            background-color: var(--td-bg-color-container);
            border-bottom: 1px solid var(--td-component-border);
        }

        .header-title {
            margin: 0;
            color: var(--td-text-color-primary);
            font-size: 20px;
            font-weight: 600;
        }

        .header-icons {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .header-icons .t-button {
            padding: 8px;
            font-size: 22px;
            transition: none;
        }

        @keyframes icon-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .animate-pop {
            animation: icon-pop 0.2s ease-in-out;
        }

        @keyframes icon-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .animate-spin {
            animation: icon-spin 0.25s ease-in-out;
        }

        .t-button--variant-text {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* 设置对话框中的提示文本 */
        .api-tip {
            font-size: 12px;
            color: var(--td-text-color-placeholder);
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div id="app">
    <t-layout class="flex-column-layout" style="height: 100%;">
        <t-header height="64px" style="padding: 0; background-color: var(--td-bg-color-container);">
            <div class="header-container">
                <h3 class="header-title">AI 助手 · DeepSeek 驱动</h3>
                <div class="header-icons">
                    <t-button 
                        shape="circle" 
                        variant="text" 
                        size="large"
                        @click="toggleDark"
                        :class="{ 'animate-pop': darkAnimate }"
                    >
                        <t-icon :name="isDark ? 'brightness' : 'moon'" />
                    </t-button>

                    <t-button 
                        shape="circle" 
                        variant="text" 
                        size="large"
                        @click="openSettings"
                        :class="{ 'animate-spin': settingsAnimate }"
                    >
                        <t-icon name="setting" />
                    </t-button>
                </div>
            </div>
        </t-header>

        <t-content class="grow-content">
            <div class="chat-scroll-area" ref="chatArea">
                <div 
                    v-for="(msg, index) in messages" 
                    :key="index" 
                    :class="['message-row', msg.role]"
                >
                    <t-avatar :theme="msg.role === 'user' ? 'primary' : 'default'" size="medium">
                        {{ msg.role === 'user' ? '我' : 'AI' }}
                    </t-avatar>
                    
                    <div class="message-bubble">
                        {{ msg.content }}
                    </div>
                </div>
            </div>
        </t-content>

        <t-footer height="auto" style="padding: 0;">
            <div class="input-area">
                <t-input 
                    v-model="inputText" 
                    size="large"
                    placeholder="请输入你的问题..." 
                    @enter="sendMessage"
                    clearable
                    style="flex: 1;"
                ></t-input>
                <t-button 
                    theme="primary" 
                    size="large" 
                    @click="sendMessage" 
                    :loading="isWaiting"
                >发送</t-button>
            </div>
        </t-footer>
    </t-layout>

    <!-- 设置弹窗：API 密钥配置 -->
    <t-dialog
        v-model:visible="settingsVisible"
        header="设置"
        :close-on-overlay-click="false"
        :on-confirm="saveApiKey"
        :on-cancel="closeSettings"
        confirm-btn="保存"
        cancel-btn="取消"
    >
        <div style="padding: 8px 0;">
            <t-input
                v-model="apiKey"
                type="password"
                placeholder="输入你的 DeepSeek API 密钥"
                clearable
                show-password
                size="large"
            />
            <div class="api-tip">密钥仅保存在浏览器本地，不会上传至任何服务器。</div>
        </div>
    </t-dialog>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/tdesign-vue-next/dist/tdesign.min.js"></script>

<script>
    const { createApp, ref, nextTick, onMounted, onUnmounted } = Vue;

    const app = createApp({
        setup() {
            const inputText = ref('');
            const isWaiting = ref(false);
            const chatArea = ref(null);
            const messages = ref([
                { role: 'assistant', content: '你好！我是你的 AI 助手（已接入 DeepSeek）。请先点击右上角设置按钮填入你的 API 密钥，然后开始聊天。' }
            ]);

            // ----- 暗色模式相关 (保持不变) -----
            const darkAnimate = ref(false);
            const settingsAnimate = ref(false);
            const isDark = ref(false);
            const STORAGE_KEY = 'theme-preference';
            const userPreference = ref(null);
            let mediaQueryList = null;
            let darkAnimationTimer = null;

            // ----- DeepSeek API 密钥 (从 localStorage 初始化) -----
            const API_KEY_STORAGE = 'deepseek_api_key';
            const apiKey = ref(localStorage.getItem(API_KEY_STORAGE) || '');
            
            // ----- 设置弹窗可见性 -----
            const settingsVisible = ref(false);

            // 应用主题函数
            const applyTheme = () => {
                let shouldBeDark;
                if (userPreference.value !== null) {
                    shouldBeDark = userPreference.value;
                } else {
                    shouldBeDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                }

                if (shouldBeDark) {
                    document.documentElement.classList.add('t-theme-dark');
                    document.documentElement.setAttribute('theme-mode', 'dark');
                } else {
                    document.documentElement.classList.remove('t-theme-dark');
                    document.documentElement.removeAttribute('theme-mode');
                }
                
                isDark.value = shouldBeDark;
            };

            const handleSystemChange = () => {
                if (userPreference.value === null) {
                    applyTheme();
                }
            };

            onMounted(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved === 'dark') userPreference.value = true;
                else if (saved === 'light') userPreference.value = false;
                else userPreference.value = null;

                applyTheme();

                mediaQueryList = window.matchMedia('(prefers-color-scheme: dark)');
                if (mediaQueryList.addEventListener) {
                    mediaQueryList.addEventListener('change', handleSystemChange);
                } else {
                    mediaQueryList.addListener(handleSystemChange);
                }
            });

            onUnmounted(() => {
                if (mediaQueryList) {
                    if (mediaQueryList.removeEventListener) {
                        mediaQueryList.removeEventListener('change', handleSystemChange);
                    } else {
                        mediaQueryList.removeListener(handleSystemChange);
                    }
                }
                if (darkAnimationTimer) {
                    clearTimeout(darkAnimationTimer);
                }
            });

            const toggleDark = () => {
                if (darkAnimationTimer) clearTimeout(darkAnimationTimer);

                const newPref = !isDark.value;
                userPreference.value = newPref;
                
                localStorage.setItem(STORAGE_KEY, newPref ? 'dark' : 'light');
                applyTheme();

                darkAnimate.value = true;
                darkAnimationTimer = setTimeout(() => {
                    darkAnimate.value = false;
                    darkAnimationTimer = null;
                }, 200);
            };

            // 打开设置弹窗 (替代原来的alert)
            const openSettings = () => {
                settingsAnimate.value = true;
                setTimeout(() => {
                    settingsAnimate.value = false;
                }, 250);
                settingsVisible.value = true;
            };

            const closeSettings = () => {
                settingsVisible.value = false;
            };

            // 保存 API 密钥
            const saveApiKey = () => {
                localStorage.setItem(API_KEY_STORAGE, apiKey.value);
                settingsVisible.value = false;
                TDesign.MessagePlugin.success('API 密钥已保存');
            };

            // 滚动到底部
            const scrollToBottom = async () => {
                await nextTick();
                if (chatArea.value) {
                    chatArea.value.scrollTo({
                        top: chatArea.value.scrollHeight,
                        behavior: 'smooth'
                    });
                }
            };

            // 发送消息 (调用 DeepSeek API)
            const sendMessage = async () => {
                const text = inputText.value.trim();
                
                if (!text) {
                    TDesign.MessagePlugin.warning('消息内容不能为空哦');
                    return;
                }

                // 检查 API 密钥
                if (!apiKey.value) {
                    TDesign.MessagePlugin.warning('请先在设置中配置 DeepSeek API 密钥');
                    openSettings();  // 自动打开设置弹窗
                    return;
                }

                if (isWaiting.value) return;

                // 添加用户消息
                messages.value.push({ role: 'user', content: text });
                inputText.value = '';
                await scrollToBottom();

                isWaiting.value = true;

                try {
                    const response = await fetch('https://api.deepseek.com/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey.value}`
                        },
                        body: JSON.stringify({
                            model: 'deepseek-chat',
                            messages: [
                                { role: 'system', content: 'You are a helpful assistant.' },
                                { role: 'user', content: text }
                            ],
                            stream: false
                        })
                    });

                    if (!response.ok) {
                        let errorMsg = `API 请求失败 (${response.status})`;
                        try {
                            const errData = await response.json();
                            errorMsg = errData.error?.message || errorMsg;
                        } catch (e) {}
                        throw new Error(errorMsg);
                    }

                    const data = await response.json();
                    const assistantReply = data.choices?.[0]?.message?.content || '抱歉，我没有得到有效回复。';

                    messages.value.push({ role: 'assistant', content: assistantReply });
                } catch (error) {
                    console.error('DeepSeek API 调用失败:', error);
                    TDesign.MessagePlugin.error(`调用失败: ${error.message}`);
                    // 可选：添加一个错误提示消息到对话中
                    messages.value.push({ 
                        role: 'assistant', 
                        content: `😓 调用 DeepSeek API 时出现问题：${error.message}。请检查密钥或网络。` 
                    });
                } finally {
                    isWaiting.value = false;
                    await scrollToBottom();
                }
            };

            return {
                inputText,
                messages,
                isWaiting,
                chatArea,
                sendMessage,
                isDark,
                darkAnimate,
                settingsAnimate,
                toggleDark,
                openSettings,      // 替换 handleSettings
                settingsVisible,
                apiKey,
                saveApiKey,
                closeSettings
            };
        }
    });

    app.use(TDesign);
    app.mount('#app');
</script>

</body>
</html>
