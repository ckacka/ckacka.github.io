<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vue 3 App with TDesign</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tdesign-vue-next/dist/tdesign-vue-next.css">
</head>
<body>
    <div id="app">
        <t-button @click="toggleDarkMode">Toggle Dark Mode</t-button>
        <t-divider></t-divider>
        <t-card v-for="item in cards" :key="item.id" class="card">
            <h3>{{ item.title }}</h3>
            <p>{{ item.description }}</p>
            <t-button @click="markAsFavorite(item.id)">Favorite</t-button>
        </t-card>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3.0.0/dist/vue.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tdesign-vue-next/dist/tdesign-vue-next.umd.min.js"></script>
    <script>
    const { createApp } = Vue;
    const { TDesign } = TDesignVue;

    createApp({
        data() {
            return {
                cards: [
                    { id: 1, title: 'Discover 1', description: 'Description 1' },
                    { id: 2, title: 'Discover 2', description: 'Description 2' },
                ],
                darkMode: false,
            };
        },
        methods: {
            toggleDarkMode() {
                this.darkMode = !this.darkMode;
                document.body.classList.toggle('dark', this.darkMode);
            },
            markAsFavorite(id) {
                // Logic for marking a card as favorite
                console.log('Favorite:', id);
            },
        },
    }).use(TDesign).mount('#app');
    </script>
    <style>
        body.dark {
            background-color: black;
            color: white;
        }
        .card {
            margin: 10px;
        }
    </style>
</body>
</html>
