<!DOCTYPE html>  
<html lang="zh-CN">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=0,viewport-fit=cover">  
    <meta name="color-scheme" content="light dark">  
    <title>树洞便签</title>  
    <link rel="stylesheet" href="https://res.wx.qq.com/t/wx_fed/weui-source/res/2.6.18/weui.min.css">  
    <style>  
        /* 基于 WeUI CSS 变量的自适应样式，完美支持暗色模式 */  
        body, html {  
            height: 100%;  
            -webkit-tap-highlight-color: transparent;  
            background-color: var(--weui-BG-0);  
            color: var(--weui-FG-0);  
            font-family: -apple-system-font, Helvetica Neue, Helvetica, sans-serif;  
            overflow: hidden;  
        }  
  
        .page {  
            position: absolute;  
            top: 0; right: 0; bottom: 0; left: 0;  
            display: none;  
            flex-direction: column;  
            animation: fadeIn .2s forwards;  
        }  
        .page.show {  
            display: flex;  
        }  
  
        /* 标题栏布局 */  
        .page__hd {  
            padding: 30px 20px 20px;  
            display: flex;  
            justify-content: space-between;  
            align-align: center;  
        }  
        .page__title {  
            font-size: 24px;  
            font-weight: 600;  
            color: var(--weui-FG-0);  
        }  
        .header-action {  
            font-size: 16px;  
            color: var(--weui-LINK);  
            line-height: 36px;  
            cursor: pointer;  
        }  
  
        /* 滚动区域 */  
        .page__bd {  
            flex: 1;  
            overflow-y: auto;  
            -webkit-overflow-scrolling: touch;  
            padding-bottom: 100px; /* 为底部按钮组留出空间 */  
        }  
  
        /* 搜索框适配 */  
        .weui-search-bar {  
            background-color: var(--weui-BG-0);  
        }  
  
        /* 列表项定制 */  
        .note-text {  
            font-size: 16px;  
            color: var(--weui-FG-0);  
            white-space: nowrap;  
            overflow: hidden;  
            text-overflow: ellipsis;  
            display: flex;  
            align-items: center;  
        }  
        .note-date {  
            font-size: 13px;  
            color: var(--weui-FG-2);  
            margin-top: 6px;  
        }  
        .tag-pinned {  
            display: inline-block;  
            font-size: 10px;  
            color: var(--weui-RED);  
            border: 1px solid var(--weui-RED);  
            border-radius: 4px;  
            padding: 0 4px;  
            margin-right: 6px;  
            line-height: 1.2;  
        }  
  
        /* 底部固定操作栏 */  
        .bottom-bar {  
            position: absolute;  
            bottom: 0; left: 0; right: 0;  
            padding: 16px;  
            padding-bottom: calc(16px + env(safe-area-inset-bottom));  
            background-color: var(--weui-BG-1);  
            box-shadow: 0 -1px 10px rgba(0,0,0,0.05);  
            display: flex;  
            gap: 10px;  
            z-index: 100;  
        }  
        .bottom-bar .weui-btn {  
            margin: 0;  
            flex: 1;  
        }  
  
        @keyframes fadeIn {  
            from { opacity: 0; transform: translateY(5px); }  
            to { opacity: 1; transform: translateY(0); }  
        }  
  
        /* 空状态 */  
        .empty-state {  
            padding: 60px 0;  
            text-align: center;  
            color: var(--weui-FG-2);  
        }  
    </style>  
</head>  
<body data-weui-theme="light">  
  
    <!-- 列表页面 -->  
    <div class="page show" id="page-list">  
        <div class="page__hd">  
            <h1 class="page__title">树洞便签</h1>  
            <span class="header-action" id="btn-toggle-manage" onclick="toggleManageMode()">管理</span>  
        </div>  
          
        <!-- 搜索栏 -->  
        <div class="weui-search-bar" id="search_bar">  
            <form class="weui-search-bar__form">  
                <div class="weui-search-bar__box">  
                    <i class="weui-icon-search"></i>  
                    <input type="search" class="weui-search-bar__input" id="search_input" placeholder="搜索便签内容" required/>  
                    <a href="javascript:" class="weui-icon-clear" id="search_clear"></a>  
                </div>  
                <label class="weui-search-bar__label" id="search_text">  
                    <i class="weui-icon-search"></i>  
                    <span>搜索</span>  
                </label>  
            </form>  
            <a href="javascript:" class="weui-search-bar__cancel-btn" id="search_cancel">取消</a>  
        </div>  
  
        <div class="page__bd">  
            <div id="note-list-container">  
                <!-- 动态渲染列表 -->  
            </div>  
        </div>  
  
        <!-- 正常模式底部栏 -->  
        <div class="bottom-bar" id="bar-normal">  
            <a href="javascript:" class="weui-btn weui-btn_primary" onclick="openAdd()">新建便签</a>  
        </div>  
  
        <!-- 管理模式底部栏 -->  
        <div class="bottom-bar" id="bar-manage" style="display: none;">  
            <a href="javascript:" class="weui-btn weui-btn_default" onclick="toggleManageMode()">取消</a>  
            <a href="javascript:" class="weui-btn weui-btn_warn" id="btn-batch-delete" onclick="batchDelete()">删除(0)</a>  
        </div>  
    </div>  
  
    <!-- 编辑页面 -->  
    <div class="page" id="page-edit">  
        <div class="page__hd">  
            <h1 class="page__title" id="edit-title">新建便签</h1>  
        </div>  
        <div class="page__bd">  
            <div class="weui-cells weui-cells_form">  
                <div class="weui-cell">  
                    <div class="weui-cell__bd">  
                        <textarea class="weui-textarea" id="note-content" placeholder="在这里输入你的便签内容..." rows="10"></textarea>  
                        <div class="weui-textarea-counter"><span id="char-count">0</span>/200</div>  
                    </div>  
                </div>  
            </div>  
              
            <div class="weui-cells">  
                <div class="weui-cell weui-cell_active weui-cell_switch">  
                    <div class="weui-cell__bd">设为置顶</div>  
                    <div class="weui-cell__ft">  
                        <input class="weui-switch" type="checkbox" id="note-pinned"/>  
                    </div>  
                </div>  
            </div>  
        </div>  
  
        <div class="bottom-bar">  
            <a href="javascript:" class="weui-btn weui-btn_default" onclick="showPage('page-list')">返回</a>  
            <a href="javascript:" class="weui-btn weui-btn_primary" onclick="saveNote()">保存</a>  
        </div>  
    </div>  
  
    <script type="text/javascript" src="https://res.wx.qq.com/t/wx_fed/weui.js/res/1.2.28/weui.min.js"></script>  
    <script type="text/javascript">  
        // 核心状态  
        let notes = JSON.parse(localStorage.getItem('weui_notes_v2') || '[]');  
        let currentEditId = null;  
        let isManageMode = false;  
        let selectedIds = new Set();  
        let searchQuery = '';  
  
        // 暗色模式自动适配逻辑  
        function updateTheme() {  
            const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;  
            document.body.setAttribute('data-weui-theme', isDark ? 'dark' : 'light');  
        }  
        updateTheme();  
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateTheme);  
  
        // 初始化  
        window.onload = function() {  
            initSearchBar();  
            renderList();  
        };  
  
        // 字数统计绑定  
        const elContent = document.getElementById('note-content');  
        elContent.addEventListener('input', function() {  
            let len = this.value.length;  
            if(len > 200) {  
                this.value = this.value.substring(0, 200);  
                len = 200;  
            }  
            document.getElementById('char-count').textContent = len;  
        });  
  
        // 页面切换  
        function showPage(pageId) {  
            document.querySelectorAll('.page').forEach(page => page.classList.remove('show'));  
            document.getElementById(pageId).classList.add('show');  
            if(pageId === 'page-list') renderList();  
        }  
  
        // --- 搜索功能绑定 ---  
        function initSearchBar() {  
            const $searchBar = document.getElementById('search_bar'),  
                  $searchText = document.getElementById('search_text'),  
                  $searchInput = document.getElementById('search_input'),  
                  $searchClear = document.getElementById('search_clear'),  
                  $searchCancel = document.getElementById('search_cancel');  
  
            function hideSearchResult() {  
                $searchBar.classList.remove('weui-search-bar_focusing');  
                $searchInput.value = '';  
                searchQuery = '';  
                renderList();  
            }  
            function cancelSearch() {  
                hideSearchResult();  
                $searchInput.blur();  
            }  
  
            $searchText.addEventListener('click', function() {  
                $searchBar.classList.add('weui-search-bar_focusing');  
                $searchInput.focus();  
            });  
            $searchInput.addEventListener('input', function() {  
                searchQuery = this.value.trim();  
                renderList();  
            });  
            $searchClear.addEventListener('click', hideSearchResult);  
            $searchCancel.addEventListener('click', cancelSearch);  
        }  
  
        // --- 核心渲染逻辑 ---  
        function renderList() {  
            const container = document.getElementById('note-list-container');  
              
            // 过滤与排序：优先置顶，其次按修改时间倒序  
            let displayNotes = notes.filter(n => n.text.toLowerCase().includes(searchQuery.toLowerCase()));  
            displayNotes.sort((a, b) => {  
                if (a.isPinned && !b.isPinned) return -1;  
                if (!a.isPinned && b.isPinned) return 1;  
                return b.time - a.time;  
            });  
  
            if (displayNotes.length === 0) {  
                container.innerHTML = `  
                    <div class="empty-state">  
                        <i class="weui-icon-info weui-icon_msg" style="font-size: 20px; color: var(--weui-FG-2); margin-bottom: 15px;"></i>  
                        <p>${searchQuery ? '没有找到相关便签' : '暂无便签数据'}</p>  
                    </div>`;  
                return;  
            }  
  
            let html = isManageMode ? '<div class="weui-cells weui-cells_checkbox">' : '<div class="weui-cells">';  
              
            displayNotes.forEach(note => {  
                let snippet = escapeHtml(note.text.replace(/\n/g, ' '));  
                if (snippet.length > 30) snippet = snippet.substring(0, 30) + '...';  
                  
                const dateStr = new Date(note.time).toLocaleString('zh-CN', {  
                    month: '2-digit', day: '2-digit', hour: '2-digit', minute:'2-digit'  
                });  
                  
                const pinTag = note.isPinned ? `<span class="tag-pinned">置顶</span>` : '';  
                const isChecked = selectedIds.has(note.id) ? 'checked' : '';  
  
                if (isManageMode) {  
                    // 多选模式  
                    html += `  
                    <label class="weui-cell weui-cell_active weui-check__label" for="s${note.id}">  
                        <div class="weui-cell__hd">  
                            <input type="checkbox" class="weui-check" name="checkbox1" id="s${note.id}" onchange="toggleSelect(${note.id})" ${isChecked}>  
                            <i class="weui-icon-checked"></i>  
                        </div>  
                        <div class="weui-cell__bd">  
                            <p class="note-text">${pinTag}${snippet}</p>  
                            <div class="note-date">${dateStr}</div>  
                        </div>  
                    </label>`;  
                } else {  
                    // 正常点击编辑模式  
                    html += `  
                    <a class="weui-cell weui-cell_active weui-cell_access" href="javascript:" onclick="openEdit(${note.id})">  
                        <div class="weui-cell__bd" style="overflow: hidden;">  
                            <p class="note-text">${pinTag}${snippet}</p>  
                            <div class="note-date">${dateStr}</div>  
                        </div>  
                        <div class="weui-cell__ft"></div>  
                    </a>`;  
                }  
            });  
            html += '</div>';  
            container.innerHTML = html;  
        }  
  
        // --- 管理与多选逻辑 ---  
        function toggleManageMode() {  
            if (notes.length === 0 && !isManageMode) {  
                weui.topTips('当前没有可管理的便签');  
                return;  
            }  
            isManageMode = !isManageMode;  
            selectedIds.clear();  
              
            document.getElementById('btn-toggle-manage').textContent = isManageMode ? '完成' : '管理';  
            document.getElementById('bar-normal').style.display = isManageMode ? 'none' : 'flex';  
            document.getElementById('bar-manage').style.display = isManageMode ? 'flex' : 'none';  
            document.getElementById('search_bar').style.display = isManageMode ? 'none' : 'flex';  
              
            updateDeleteBtn();  
            renderList();  
        }  
  
        function toggleSelect(id) {  
            if (selectedIds.has(id)) selectedIds.delete(id);  
            else selectedIds.add(id);  
            updateDeleteBtn();  
        }  
  
        function updateDeleteBtn() {  
            const btn = document.getElementById('btn-batch-delete');  
            btn.textContent = `删除(${selectedIds.size})`;  
            btn.classList.toggle('weui-btn_disabled', selectedIds.size === 0);  
        }  
  
        function batchDelete() {  
            if (selectedIds.size === 0) return;  
            weui.confirm(`确认删除选中的 ${selectedIds.size} 项便签吗？`, function () {  
                notes = notes.filter(n => !selectedIds.has(n.id));  
                saveData();  
                weui.toast('删除成功');  
                toggleManageMode();  
            }, function () {  
                // 取消  
            });  
        }  
  
        // --- 增改查逻辑 ---  
        function openAdd() {  
            currentEditId = null;  
            document.getElementById('edit-title').textContent = '新建便签';  
            elContent.value = '';  
            document.getElementById('char-count').textContent = '0';  
            document.getElementById('note-pinned').checked = false;  
            showPage('page-edit');  
        }  
  
        function openEdit(id) {  
            const note = notes.find(n => n.id === id);  
            if (!note) return;  
              
            currentEditId = id;  
            document.getElementById('edit-title').textContent = '编辑便签';  
            elContent.value = note.text;  
            document.getElementById('char-count').textContent = note.text.length;  
            document.getElementById('note-pinned').checked = !!note.isPinned;  
            showPage('page-edit');  
        }  
  
        function saveNote() {  
            const text = elContent.value.trim();  
            const isPinned = document.getElementById('note-pinned').checked;  
              
            if (!text) {  
                weui.topTips('便签内容不能为空');  
                return;  
            }  
  
            if (currentEditId) {  
                const note = notes.find(n => n.id === currentEditId);  
                if (note) {  
                    note.text = text;  
                    note.isPinned = isPinned;  
                    note.time = Date.now();  
                }  
            } else {  
                notes.push({  
                    id: Date.now(),  
                    text: text,  
                    isPinned: isPinned,  
                    time: Date.now()  
                });  
            }  
  
            saveData();  
            weui.toast('已保存', { duration: 1000 });  
            setTimeout(() => showPage('page-list'), 300);  
        }  
  
        function saveData() {  
            localStorage.setItem('weui_notes_v2', JSON.stringify(notes));  
        }  
  
        function escapeHtml(unsafe) {  
            return unsafe  
                 .replace(/&/g, "&amp;")  
                 .replace(/</g, "&lt;")  
                 .replace(/>/g, "&gt;")  
                 .replace(/"/g, "&quot;")  
                 .replace(/'/g, "&#039;");  
        }  
    </script>  
</body>  
</html>
