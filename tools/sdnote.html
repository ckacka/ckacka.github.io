<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>树洞便签</title>
    
    <link rel="stylesheet" href="https://unpkg.com/tdesign-vue-next/dist/tdesign.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

    <style>
        :root {
            --app-bg: var(--td-bg-color-page);
            --card-bg: var(--td-bg-color-container);
            --text-primary: var(--td-text-color-primary);
            --text-secondary: var(--td-text-color-secondary);
            --border-color: var(--td-border-level-1-color);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--app-bg); color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        #app { display: flex; flex-direction: column; min-height: 100vh; }

        /* --- 导航与列表 --- */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: var(--app-bg);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
        }

        .nav-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
        }
        .nav-brand { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        
        .filter-section { padding: 12px 20px; background-color: var(--app-bg); }
        
        .main-content { padding: 12px 20px 24px 20px; flex: 1; }
        
        .notes-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px;
        }
        .note-card {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 16px; cursor: pointer;
            display: flex; flex-direction: column; transition: transform 0.2s, box-shadow 0.2s;
        }
        .note-card:active { transform: scale(0.98); }
        .card-title { font-size: 16px; font-weight: 600; margin: 0 0 8px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .card-preview { font-size: 14px; color: var(--text-secondary); display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 12px; flex: 1; line-height: 1.5; word-break: break-all; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--td-text-color-placeholder); border-top: 1px dashed var(--border-color); padding-top: 12px; }

        /* --- 返回顶部按钮 --- */
        .back-top-btn {
            position: fixed;
            bottom: 32px;
            right: 24px;
            width: 44px;
            height: 44px;
            background-color: var(--td-brand-color);
            color: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 12px rgba(0, 82, 217, 0.3);
            cursor: pointer;
            z-index: 99;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }
        .back-top-btn.is-visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .back-top-btn:active { transform: scale(0.9); }

        /* --- 富文本编辑器适配 --- */
        .editor-wrapper {
            border: 1px solid var(--border-color); border-radius: 4px;
            background-color: var(--card-bg); overflow: hidden;
            display: flex; flex-direction: column;
            transition: all 0.2s ease;
        }
        .editor-wrapper.is-fullscreen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 99999; border-radius: 0; border: none;
        }
        
        #quill-editor { min-height: 200px; max-height: 40vh; overflow-y: auto; }
        .editor-wrapper.is-fullscreen #quill-editor { max-height: none; flex: 1; }
        
        .ql-toolbar.ql-snow {
            border: none !important; border-bottom: 1px solid var(--border-color) !important;
            background-color: var(--td-bg-color-secondarycontainer);
            padding: 10px 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .toolbar-group-left { display: flex; flex-wrap: wrap; gap: 16px; }
        .ql-formats { display: flex !important; gap: 8px !important; margin: 0 !important; align-items: center; }
        
        .ql-container.ql-snow { border: none !important; }
        .ql-editor { color: var(--text-primary); font-size: 15px; line-height: 1.6; padding: 12px; }
        
        html[theme-mode="dark"] .ql-snow .ql-stroke { stroke: var(--text-secondary); }
        html[theme-mode="dark"] .ql-snow .ql-fill { fill: var(--text-secondary); }
        html[theme-mode="dark"] .ql-snow .ql-picker { color: var(--text-secondary); }

        .custom-fullscreen-btn {
            background: transparent; border: none; padding: 4px;
            color: var(--text-secondary); cursor: pointer;
            display: flex; align-items: center; transition: color 0.2s;
        }
        .custom-fullscreen-btn:hover { color: var(--td-brand-color); }
    </style>
</head>
<body>

<div id="app">
    <div class="sticky-header">
        <header class="nav-bar">
            <div class="nav-brand">
                <i class="ri-sticky-note-line" style="color: var(--td-brand-color);"></i> 树洞便签
            </div>
            <t-button theme="primary" @click="openDialog()">
                <template #icon><i class="ri-add-line"></i></template>
                新建
            </t-button>
        </header>

        <div class="filter-section">
            <t-input v-model="searchQuery" placeholder="搜索便签内容或标题" clearable>
                <template #prefix-icon><i class="ri-search-line"></i></template>
            </t-input>
        </div>
    </div>

    <main class="main-content">
        <div v-if="filteredNotes.length === 0" style="margin-top: 60px;">
            <t-empty icon="ri-file-search-line" :description="searchQuery ? '未找到相关便签' : '暂无便签，点击右上角新建'" />
        </div>
        <div class="notes-grid" v-else>
            <div v-for="note in filteredNotes" :key="note.id" class="note-card" @click="openDialog(note)">
                <h3 class="card-title">{{ note.title || '无标题' }}</h3>
                <div class="card-preview">{{ note.plainText || '无内容' }}</div>
                <div class="card-footer">
                    <span>{{ note.plainText.length }} 字</span>
                    <span>{{ formatDate(note.updatedAt) }}</span>
                </div>
            </div>
        </div>
    </main>

    <div class="back-top-btn" :class="{ 'is-visible': showBackTop }" @click="scrollToTop">
        <i class="ri-arrow-up-line" style="font-size: 24px;"></i>
    </div>

    <t-dialog 
        v-model:visible="dialogVisible" 
        :header="isEditing ? '编辑便签' : '新建便签'" 
        placement="center"
        width="90%"
        :style="{ maxWidth: '600px' }"
        destroy-on-close
        @opened="onDialogOpened"
        @closed="onDialogClosed">
        
        <div style="margin-bottom: 16px;">
            <t-input v-model="currentNote.title" placeholder="请输入便签标题（选填）" clearable />
        </div>

        <div class="editor-wrapper" :class="{ 'is-fullscreen': isEditorFullscreen }">
            <div id="quill-toolbar">
                <div class="toolbar-group-left">
                    <span class="ql-formats">
                        <button class="ql-bold"></button>
                        <button class="ql-italic"></button>
                    </span>
                    <span class="ql-formats">
                        <button class="ql-list" value="ordered"></button>
                        <button class="ql-list" value="bullet"></button>
                    </span>
                    <span class="ql-formats">
                        <select class="ql-color"></select>
                        <select class="ql-background"></select>
                    </span>
                    <span class="ql-formats">
                        <button class="ql-clean"></button>
                    </span>
                </div>
                <div>
                    <span class="ql-formats">
                        <button type="button" class="custom-fullscreen-btn" @click="toggleFullscreen" :title="isEditorFullscreen ? '退出全屏' : '全屏模式'">
                            <i :class="isEditorFullscreen ? 'ri-fullscreen-exit-line' : 'ri-fullscreen-line'" style="font-size: 18px;"></i>
                        </button>
                    </span>
                </div>
            </div>
            <div id="quill-editor"></div>
        </div>

        <template #footer>
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <span style="font-size: 13px; color: var(--td-text-color-placeholder);">
                        共 {{ currentNote.plainText.length }} 字
                    </span>
                    <t-popconfirm v-if="isEditing" content="确定要删除这条便签吗？" theme="danger" @confirm="deleteNote(currentNote.id)">
                        <t-button theme="danger" variant="text" size="small">删除</t-button>
                    </t-popconfirm>
                </div>
                <div style="display: flex; gap: 8px;">
                    <t-button theme="default" variant="outline" @click="closeDialog">取消</t-button>
                    <t-button theme="primary" @click="saveNote">保存</t-button>
                </div>
            </div>
        </template>
    </t-dialog>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/tdesign-vue-next/dist/tdesign.min.js"></script>
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<script>
const { createApp, ref, computed, onMounted, onUnmounted, watch } = Vue;

const setupDarkMode = () => {
    const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
    const updateTheme = (e) => {
        document.documentElement.setAttribute('theme-mode', e.matches ? 'dark' : 'light');
    };
    updateTheme(mediaQuery); 
    mediaQuery.addEventListener('change', updateTheme);
};

const app = createApp({
    setup() {
        const notes = ref([]);
        const searchQuery = ref('');
        const dialogVisible = ref(false);
        const isEditing = ref(false);
        const isEditorFullscreen = ref(false);
        const showBackTop = ref(false); 
        
        let quillInstance = null;

        const currentNote = ref({
            id: null,
            title: '',
            content: '',
            plainText: ''
        });

        const handleScroll = () => {
            showBackTop.value = window.scrollY > 200;
        };

        const scrollToTop = () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        };

        onMounted(() => {
            setupDarkMode();
            window.addEventListener('scroll', handleScroll);

            // 修改了本地存储的键名为 treehole_notes，如果你想保留之前测试的数据，可以改回 tdesign_native_notes
            const saved = localStorage.getItem('treehole_notes');
            if (saved) {
                try { notes.value = JSON.parse(saved); } catch (e) { console.error(e); }
            }
        });

        onUnmounted(() => {
            window.removeEventListener('scroll', handleScroll);
        });

        watch(notes, (newNotes) => {
            localStorage.setItem('treehole_notes', JSON.stringify(newNotes));
        }, { deep: true });

        const filteredNotes = computed(() => {
            if (!searchQuery.value.trim()) return notes.value.sort((a, b) => b.updatedAt - a.updatedAt);
            const keyword = searchQuery.value.toLowerCase();
            return notes.value.filter(note => 
                (note.title && note.title.toLowerCase().includes(keyword)) ||
                (note.plainText && note.plainText.toLowerCase().includes(keyword))
            ).sort((a, b) => b.updatedAt - a.updatedAt);
        });

        const toggleFullscreen = () => {
            isEditorFullscreen.value = !isEditorFullscreen.value;
        };

        const openDialog = (note = null) => {
            if (note) {
                isEditing.value = true;
                currentNote.value = { ...note };
            } else {
                isEditing.value = false;
                currentNote.value = { id: null, title: '', content: '', plainText: '' };
            }
            isEditorFullscreen.value = false;
            dialogVisible.value = true;
        };

        const onDialogOpened = () => {
            quillInstance = new Quill('#quill-editor', {
                theme: 'snow',
                placeholder: '把想说的话留在这里...',
                modules: { toolbar: '#quill-toolbar' }
            });

            if (currentNote.value.content) {
                quillInstance.root.innerHTML = currentNote.value.content;
            }

            quillInstance.on('text-change', () => {
                currentNote.value.content = quillInstance.root.innerHTML;
                let text = quillInstance.getText();
                if (text.endsWith('\n')) {
                    text = text.slice(0, -1);
                }
                currentNote.value.plainText = text;
            });

            if (!isEditing.value) {
                setTimeout(() => quillInstance.focus(), 50);
            }
        };

        const onDialogClosed = () => {
            quillInstance = null;
            isEditorFullscreen.value = false;
        };

        const closeDialog = () => {
            dialogVisible.value = false;
        };

        const saveNote = () => {
            const hasTitle = !!currentNote.value.title.trim();
            const hasContent = !!currentNote.value.plainText.trim();

            if (!hasTitle && !hasContent) {
                TDesign.MessagePlugin.warning('内容和标题不能同时为空');
                return;
            }

            const timestamp = Date.now();
            if (isEditing.value) {
                const index = notes.value.findIndex(n => n.id === currentNote.value.id);
                if (index !== -1) {
                    notes.value[index] = { ...currentNote.value, updatedAt: timestamp };
                    TDesign.MessagePlugin.success('已保存修改');
                }
            } else {
                notes.value.unshift({
                    ...currentNote.value,
                    id: 'note_' + timestamp,
                    createdAt: timestamp,
                    updatedAt: timestamp
                });
                TDesign.MessagePlugin.success('已存入树洞');
            }
            
            closeDialog();
            scrollToTop();
        };

        const deleteNote = (id) => {
            notes.value = notes.value.filter(n => n.id !== id);
            TDesign.MessagePlugin.success('便签已删除');
            closeDialog();
        };

        const formatDate = (timestamp) => {
            const d = new Date(timestamp);
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            const h = String(d.getHours()).padStart(2, '0');
            const min = String(d.getMinutes()).padStart(2, '0');
            
            if (y === new Date().getFullYear()) {
                return `${m}-${day} ${h}:${min}`;
            }
            return `${y}-${m}-${day} ${h}:${min}`;
        };

        return {
            searchQuery, filteredNotes, dialogVisible, isEditing, currentNote, isEditorFullscreen, showBackTop,
            openDialog, closeDialog, onDialogOpened, onDialogClosed, saveNote, deleteNote, formatDate, toggleFullscreen, scrollToTop
        };
    }
});

app.use(TDesign);
app.mount('#app');
</script>

</body>
</html>
