<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=0,viewport-fit=cover">
    <title>树洞AI大厨</title>
    <!-- 引入 WeUI 官方样式 -->
    <link rel="stylesheet" href="https://res.wx.qq.com/t/wx_fed/weui-source/res/2.6.18/weui.min.css">
    <style>
        /* 基础自适应主题 */
        body, html { height: 100%; -webkit-tap-highlight-color: transparent; background-color: var(--weui-BG-0); color: var(--weui-FG-0); overflow: hidden; }
        .page { height: 100%; display: flex; flex-direction: column; }
        .content { flex: 1; overflow-y: auto; padding-bottom: calc(env(safe-area-inset-bottom) + 60px); }
        
        /* 隐藏的 Tab 面板 */
        #favoritePanel, #settingsPanel { display: none; }
        
        /* 严格遵循官方 Slideview 结构与计算 */
        .weui-slideview { position: relative; overflow: hidden; }
        .weui-slideview__left { position: relative; z-index: 10; background-color: var(--weui-BG-2); transition: transform .3s ease; width: 100%; }
        .weui-slideview__right { position: absolute; right: 0; top: 0; bottom: 0; z-index: 1; }
        .weui-slideview__btn__wrap { display: flex; height: 100%; }
        .weui-slideview__btn { display: flex; align-items: center; justify-content: center; width: 75px; color: #FFF; background-color: var(--weui-RED); text-decoration: none; font-size: 17px; }
        .slide-open .weui-slideview__left { transform: translateX(-75px); }
        
        /* 半屏弹窗内容区 */
        .weui-half-screen-dialog__bd { text-align: left; white-space: pre-wrap; line-height: 1.6; padding-bottom: 20px; color: var(--weui-FG-0); font-size: 16px; min-height: 30vh; max-height: 60vh; overflow-y: auto; }
        .weui-half-screen-dialog__ft { display: flex; gap: 16px; padding: 16px 24px calc(env(safe-area-inset-bottom) + 16px); }
        .weui-half-screen-dialog__ft .weui-btn { flex: 1; margin: 0; }
        
        /* 右上角图标样式（刷新与删除共用） */
        .dialog-top-icon { width: 24px; height: 24px; vertical-align: middle; fill: var(--weui-FG-0); }
        .dialog-top-icon-red { fill: var(--weui-RED); }
        
        /* 确保 svg 颜色跟随主题 */
        .weui-tabbar__icon svg { fill: var(--weui-FG-1); width: 100%; height: 100%; }
        .weui-bar__item_on .weui-tabbar__icon svg { fill: var(--weui-BRAND); }

        /* 空状态统一背景样式 */
        #favoriteEmpty {
            background-color: var(--weui-BG-2);
            height: 100%;
            padding-top: 60px;
            box-sizing: border-box;
        }
    </style>
</head>
<body ontouchstart>

<div class="weui-tab page">
    <!-- 主体内容区 -->
    <div class="weui-tab__panel content">
        
        <!-- 首页：生成菜谱 -->
        <div id="homePanel">
            <div class="weui-form">
                <div class="weui-form__text-area">
                    <h2 class="weui-form__title">树洞AI大厨</h2>
                    <div class="weui-form__desc">输入现有食材和偏好，让AI大厨为你定制菜谱</div>
                </div>
                <div class="weui-form__control-area">
                    <div class="weui-cells__group weui-cells__group_form">
                        <div class="weui-cells weui-cells_form">
                            <!-- 现有食材 -->
                            <div class="weui-cell weui-cell_active">
                                <div class="weui-cell__hd">
                                    <label class="weui-label">现有食材</label>
                                </div>
                                <div class="weui-cell__bd">
                                    <input id="ingredients" class="weui-input" type="text" placeholder="如：辣椒、猪肉 (必填)" />
                                </div>
                            </div>
                            
                            <!-- 口味偏好 -->
                            <div class="weui-cell weui-cell_active">
                                <div class="weui-cell__hd">
                                    <label class="weui-label">口味偏好</label>
                                </div>
                                <div class="weui-cell__bd">
                                    <input id="taste" class="weui-input" type="text" placeholder="如：香辣下饭 (选填)" />
                                </div>
                            </div>

                            <!-- 菜品风格模拟选择框 (符合 WeUI 官方 Select 规范) -->
                            <div class="weui-cell weui-cell_active weui-cell_select weui-cell_select-after" id="showStylePickerBtn">
                                <div class="weui-cell__hd">
                                    <label class="weui-label">菜品风格</label>
                                </div>
                                <div class="weui-cell__bd">
                                    <div class="weui-select" id="styleSelectText">日常家常</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="weui-form__opr-area">
                    <a class="weui-btn weui-btn_primary" href="javascript:" id="generateBtn">生成专属菜谱</a>
                </div>
            </div>
        </div>

        <!-- 菜谱库 -->
        <div id="favoritePanel" style="height: 100%;">
            <div class="weui-search-bar" id="searchBar">
                <form class="weui-search-bar__form">
                    <div class="weui-search-bar__box">
                        <i class="weui-icon-search"></i>
                        <input type="search" class="weui-search-bar__input" id="searchInput" placeholder="搜索菜谱库" required/>
                        <a href="javascript:" class="weui-icon-clear" id="searchClear"></a>
                    </div>
                    <label class="weui-search-bar__label" id="searchText">
                        <i class="weui-icon-search"></i>
                        <span>搜索菜谱库</span>
                    </label>
                </form>
                <a href="javascript:" class="weui-search-bar__cancel-btn" id="searchCancel">取消</a>
            </div>
            
            <!-- 使用 WeUI 官方 Msg 组件作为空状态 -->
            <div class="weui-msg" id="favoriteEmpty" style="display: none;">
                <div class="weui-msg__icon-area"><i class="weui-icon-info weui-icon_msg"></i></div>
                <div class="weui-msg__text-area">
                    <h2 class="weui-msg__title">暂无数据</h2>
                    <p class="weui-msg__desc"></p>
                </div>
            </div>
            
            <div class="weui-cells" id="favoriteList" style="margin-top: 0; display: none;">
                <!-- 列表动态注入 -->
            </div>
        </div>

        <!-- 设置页 -->
        <div id="settingsPanel">
            <div class="weui-form">
                <div class="weui-form__text-area">
                    <h2 class="weui-form__title">系统设置</h2>
                    <div class="weui-form__desc">配置 DeepSeek API 即可解锁核心功能</div>
                </div>
                <div class="weui-form__control-area">
                    <div class="weui-cells__group weui-cells__group_form">
                        <div class="weui-cells weui-cells_form">
                            <div class="weui-cell weui-cell_active">
                                <div class="weui-cell__hd">
                                    <label class="weui-label">API Key</label>
                                </div>
                                <div class="weui-cell__bd">
                                    <input id="apiKeyInput" class="weui-input" type="password" placeholder="请输入 sk-..." />
                                </div>
                            </div>
                        </div>
                        <div class="weui-cells__tips">
                            密钥仅保存在本地中。向左滑动收藏页的菜谱卡片可唤出删除按钮。
                        </div>
                    </div>
                </div>
                <div class="weui-form__opr-area">
                    <a class="weui-btn weui-btn_primary" href="javascript:" id="saveSettingsBtn">保存配置</a>
                </div>
            </div>
        </div>

    </div>

    <!-- 底部导航 -->
    <div class="weui-tabbar">
        <div class="weui-tabbar__item weui-bar__item_on" onclick="switchTab('home')">
            <div class="weui-tabbar__icon">
                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
            </div>
            <p class="weui-tabbar__label">生成</p>
        </div>
        <div class="weui-tabbar__item" onclick="switchTab('favorite')">
            <div class="weui-tabbar__icon">
                <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </div>
            <p class="weui-tabbar__label">菜谱库</p>
        </div>
        <div class="weui-tabbar__item" onclick="switchTab('settings')">
            <div class="weui-tabbar__icon">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94L14.4 2.81c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41L9.25 5.35C8.66 5.59 8.12 5.92 7.63 6.29L5.24 5.33c-.22-.08-.47 0-.59.22L2.73 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .43-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.49-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            </div>
            <p class="weui-tabbar__label">设置</p>
        </div>
    </div>
</div>

<!-- WeUI 半屏弹窗 (详情) -->
<div id="recipeDetailDialog" style="display: none;">
    <div class="weui-mask" onclick="closeRecipeDetail()"></div>
    <div class="weui-half-screen-dialog">
        <div class="weui-half-screen-dialog__hd">
            <div class="weui-half-screen-dialog__hd__side" onclick="closeRecipeDetail()">
                <button class="weui-icon-btn"><i class="weui-icon-close-thin"></i></button>
            </div>
            <div class="weui-half-screen-dialog__hd__main">
                <strong class="weui-half-screen-dialog__title" id="detailTitle">菜谱详情</strong>
                <span class="weui-half-screen-dialog__subtitle" id="detailSubtitle"></span>
            </div>
            <div class="weui-half-screen-dialog__hd__side">
                <button id="dialogRegenerateBtn" class="weui-icon-btn" style="display: none;">
                    <svg class="dialog-top-icon" viewBox="0 0 24 24">
                        <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                    </svg>
                </button>
                <button id="dialogDeleteBtn" class="weui-icon-btn" style="display: none;">
                    <svg class="dialog-top-icon dialog-top-icon-red" viewBox="0 0 24 24">
                        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="weui-half-screen-dialog__bd" id="detailContent">
        </div>
        <div class="weui-half-screen-dialog__ft">
            <a href="javascript:" class="weui-btn weui-btn_default" id="dialogCopyBtn">复制</a>
            <a href="javascript:" class="weui-btn weui-btn_primary" id="dialogFavBtn">加入库中</a>
        </div>
    </div>
</div>

<!-- 引入 WeUI JS -->
<script type="text/javascript" src="https://res.wx.qq.com/t/wx_fed/weui.js/res/1.2.28/weui.min.js"></script>

<script>
    const API_KEY_STORAGE_KEY = 'DS_RECIPE_API_KEY';
    const RECIPES_STORAGE_KEY = 'DS_FAVORITE_RECIPES';
    
    let currentGeneratedRecipe = null; 
    let currentViewingRecipeId = null;
    let selectedStyleText = '日常家常';

    // 主题适配
    function applyTheme() {
        const isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.body.setAttribute('data-weui-theme', isDarkMode ? 'dark' : 'light');
    }
    applyTheme();
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);

    // 数据管理模块
    const RecipeManager = {
        getAll() {
            try { return JSON.parse(localStorage.getItem(RECIPES_STORAGE_KEY)) || []; } catch(e) { return []; }
        },
        add(recipe) {
            try {
                const list = this.getAll();
                recipe.id = 'recipe_' + Date.now().toString(); 
                recipe.date = new Date().toLocaleDateString();
                list.unshift(recipe);
                localStorage.setItem(RECIPES_STORAGE_KEY, JSON.stringify(list));
            } catch(e) {
                weui.alert('存储失败');
            }
        },
        remove(id) {
            try {
                const list = this.getAll().filter(r => r.id !== id);
                localStorage.setItem(RECIPES_STORAGE_KEY, JSON.stringify(list));
            } catch(e) {
                console.error('删除失败', e);
            }
        },
        search(keyword) {
            if (!keyword) return this.getAll();
            const lowerK = keyword.toLowerCase();
            return this.getAll().filter(r => 
                (r.title && r.title.toLowerCase().includes(lowerK)) || 
                (r.ingredients && r.ingredients.toLowerCase().includes(lowerK))
            );
        }
    };

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
        const savedKey = localStorage.getItem(API_KEY_STORAGE_KEY);
        if (savedKey) document.getElementById('apiKeyInput').value = savedKey;
        renderFavoriteList('');

        // 绑定模拟选择框点击唤起 WeUI Picker
        document.getElementById('showStylePickerBtn').addEventListener('click', function () {
            weui.picker([{
                label: '极简家常', value: '极简家常'
            }, {
                label: '日常家常', value: '日常家常'
            }, {
                label: '精致美味', value: '精致美味'
            }, {
                label: '餐厅级别', value: '餐厅级别'
            }, {
                label: '国宴正式', value: '国宴正式'
            }], {
                defaultValue: [selectedStyleText],
                onConfirm: function (result) {
                    selectedStyleText = result[0].value;
                    document.getElementById('styleSelectText').innerText = selectedStyleText;
                },
                title: '选择菜品风格'
            });
        });
    });

    // 核心生成逻辑
    async function doGenerate() {
        const apiKey = localStorage.getItem(API_KEY_STORAGE_KEY);
        if (!apiKey) {
            weui.dialog({
                title: '未配置 API Key',
                content: '请先前往"设置"页面配置 DeepSeek API Key。',
                buttons: [{ label: '去设置', type: 'primary', onClick: () => switchTab('settings') }]
            });
            return;
        }

        const ingredients = document.getElementById('ingredients').value.trim();
        const taste = document.getElementById('taste').value.trim();
        if (!ingredients) return weui.topTips('请至少输入一样食材');

        let stylePrompt = "普通家常菜";
        if (selectedStyleText === '极简家常') stylePrompt = "极简做法，追求极致速度和便捷，不需要复杂厨具和高超技巧，适合新手和懒人。";
        else if (selectedStyleText === '日常家常') stylePrompt = "标准的日常家常菜做法，接地气，好吃下饭。";
        else if (selectedStyleText === '精致美味') stylePrompt = "精致的家宴做法，步骤稍多，注重口味层次和家常摆盘。";
        else if (selectedStyleText === '餐厅级别') stylePrompt = "高级餐厅级别的做法，包含进阶的烹饪技巧 and 调味搭配。";
        else if (selectedStyleText === '国宴正式') stylePrompt = "国宴/顶级正式宴席标准，极度考究食材处理、摆盘美学和严谨的烹饪技法。";

        const loading = weui.loading('大厨正在思考');

        try {
            const response = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'Authorization': `Bearer ${apiKey}` 
                },
                body: JSON.stringify({
                    "model": "deepseek-v4-pro",
                    "messages": [
                        { "role": "system", "content": "你是一名专业厨师。请根据用户提供的食材、口味和指定风格推荐一道菜。首行严格输出菜名（无任何标点）。之后换行列出食材用量和详细步骤。排版整洁。" },
                        { "role": "user", "content": `食材：${ingredients}。口味偏好：${taste || '任意'}。要求的菜品风格与难度水平：${stylePrompt}。如果可以的话，请给我一个和刚才不同的做法或菜品。` }
                    ],
                    "thinking": {"type": "enabled"},
                    "reasoning_effort": "high",
                    "stream": false
                })
            });

            const data = await response.json();
            loading.hide();

            if (!response.ok || data.error) {
                return weui.alert('API 异常: ' + (data.error?.message || response.statusText));
            }
            if (!data.choices || data.choices.length === 0) {
                return weui.alert('生成失败，返回数据异常。');
            }

            const resultText = data.choices[0].message.content.trim();
            const lines = resultText.split('\n');
            const title = lines[0].replace(/[*#]/g, '').trim(); 
            const content = lines.slice(1).join('\n').trim();

            currentGeneratedRecipe = { title, ingredients, taste, content };
            openRecipeDetail(currentGeneratedRecipe, true);

        } catch (error) {
            loading.hide();
            weui.alert('网络请求失败，请检查连接。');
        }
    }

    document.getElementById('generateBtn').addEventListener('click', doGenerate);
    document.getElementById('dialogRegenerateBtn').addEventListener('click', doGenerate);

    // 保存设置
    document.getElementById('saveSettingsBtn').addEventListener('click', () => {
        const keyInput = document.getElementById('apiKeyInput').value.trim();
        if (!keyInput) return weui.topTips('API Key 不能为空');
        localStorage.setItem(API_KEY_STORAGE_KEY, keyInput);
        weui.toast('设置已保存', 1500);
    });

    // 弹窗操作
    document.getElementById('dialogCopyBtn').addEventListener('click', function() {
        const title = document.getElementById('detailTitle').innerText;
        const content = document.getElementById('detailContent').innerText;
        navigator.clipboard.writeText(`【${title}】\n${content}`).then(() => weui.toast('已复制', 1500));
    });

    document.getElementById('dialogFavBtn').addEventListener('click', function() {
        if (!currentGeneratedRecipe) return;
        RecipeManager.add(currentGeneratedRecipe);
        weui.toast('已加入菜谱库', 1500);
        document.getElementById('dialogFavBtn').style.display = 'none'; 
        renderFavoriteList(document.getElementById('searchInput').value);
    });

    document.getElementById('dialogDeleteBtn').addEventListener('click', function() {
        if (!currentViewingRecipeId) return;
        weui.confirm('确定要从库中删除这篇菜谱吗？', function () {
            RecipeManager.remove(currentViewingRecipeId);
            closeRecipeDetail();
            renderFavoriteList(document.getElementById('searchInput').value);
            weui.toast('已删除', 1000);
        });
    });

    // 列表渲染
    function renderFavoriteList(keyword) {
        const list = RecipeManager.search(keyword);
        const emptyState = document.getElementById('favoriteEmpty');
        const listContainer = document.getElementById('favoriteList');

        if (list.length === 0) {
            emptyState.style.display = 'block';
            listContainer.style.display = 'none';
        } else {
            emptyState.style.display = 'none';
            listContainer.style.display = 'block';
            
            listContainer.innerHTML = list.map(recipe => `
                <div class="weui-slideview" id="slide_${recipe.id}">
                    <div class="weui-slideview__left" onclick="openSavedRecipe('${recipe.id}')">
                        <div class="weui-cell weui-cell_access">
                            <div class="weui-cell__bd">
                                <div class="safe-title" style="font-weight: 500;"></div>
                                <div style="font-size: 13px; color: var(--weui-FG-2); margin-top: 4px;" class="safe-ing"></div>
                            </div>
                            <div class="weui-cell__ft"></div>
                        </div>
                    </div>
                    <div class="weui-slideview__right">
                        <div class="weui-slideview__btn__wrap">
                            <a href="javascript:" class="weui-slideview__btn" onclick="deleteRecipe(event, '${recipe.id}')">删除</a>
                        </div>
                    </div>
                </div>
            `).join('');

            const slides = listContainer.querySelectorAll('.weui-slideview');
            slides.forEach((slide, index) => {
                slide.querySelector('.safe-title').innerText = list[index].title;
                slide.querySelector('.safe-ing').innerText = `食材: ${list[index].ingredients}`;
            });

            bindSlideEvents();
        }
    }

    // 【核心修复】高精度全流程手势追踪，完美契合移动端纵向滚动与横向左滑的冲突
    function bindSlideEvents() {
        const items = document.querySelectorAll('.weui-slideview');
        items.forEach(item => {
            let startX = 0;
            let startY = 0;
            let isSliding = false;

            item.addEventListener('touchstart', e => {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                isSliding = true;
            }, { passive: true });

            item.addEventListener('touchmove', e => {
                if (!isSliding) return;
                const moveX = e.touches[0].clientX;
                const moveY = e.touches[0].clientY;
                
                const diffX = startX - moveX;
                const diffY = Math.abs(startY - moveY);

                // 如果横向滑动距离大于纵向，说明用户明确是在左滑，必须阻止系统默认的页面滚动
                if (diffX > 10 && diffX > diffY) {
                    if (e.cancelable) e.preventDefault(); 
                }
            }, { passive: false }); // 必须设置为 false 才能生效 preventDefault

            item.addEventListener('touchend', e => {
                if (!isSliding) return;
                isSliding = false;
                
                const endX = e.changedTouches[0].clientX;
                const endY = e.changedTouches[0].clientY;
                
                const diffX = startX - endX;
                const diffY = Math.abs(startY - endY);

                // 过滤掉纵向的大幅误触滚动
                if (diffY > 40) return;

                // 判定阈值：向左划动超过 35 像素则打开
                if (diffX > 35) {
                    // 先收起其它已经打开的行
                    document.querySelectorAll('.slide-open').forEach(el => el.classList.remove('slide-open'));
                    item.classList.add('slide-open');
                } 
                // 向右划动超过 35 像素则收回
                else if (diffX < -35) {
                    item.classList.remove('slide-open');
                }
            }, { passive: true });
        });
    }

    window.openSavedRecipe = function(id) {
        const slideItem = document.getElementById(`slide_${id}`);
        if(slideItem && slideItem.classList.contains('slide-open')){
            slideItem.classList.remove('slide-open');
            return;
        }
        const recipe = RecipeManager.getAll().find(r => r.id === id);
        if (recipe) openRecipeDetail(recipe, false);
    };

    window.openRecipeDetail = function(recipe, isNew) {
        currentViewingRecipeId = isNew ? null : recipe.id;

        document.getElementById('detailTitle').innerText = recipe.title;
        document.getElementById('detailSubtitle').innerText = isNew ? '刚刚生成' : ('收录于 ' + recipe.date);
        document.getElementById('detailContent').innerText = recipe.content;
        
        document.getElementById('dialogFavBtn').style.display = isNew ? 'block' : 'none';
        document.getElementById('dialogRegenerateBtn').style.display = isNew ? 'block' : 'none';
        document.getElementById('dialogDeleteBtn').style.display = isNew ? 'none' : 'block';
        
        const dialog = document.getElementById('recipeDetailDialog');
        if (dialog.style.display !== 'block') {
            dialog.style.display = 'block';
            setTimeout(() => {
                dialog.querySelector('.weui-mask').classList.add('weui-animate-fade-in');
                dialog.querySelector('.weui-half-screen-dialog').classList.add('weui-animate-slide-up');
            }, 10);
        }
    };

    window.closeRecipeDetail = function() {
        const dialog = document.getElementById('recipeDetailDialog');
        dialog.querySelector('.weui-mask').classList.remove('weui-animate-fade-in');
        dialog.querySelector('.weui-half-screen-dialog').classList.remove('weui-animate-slide-up');
        setTimeout(() => { dialog.style.display = 'none'; }, 200);
    };

    window.deleteRecipe = function(event, id) {
        event.stopPropagation(); // 阻止冒泡，防止触发详情弹窗
        weui.confirm('确定要删除这篇菜谱吗？', function () {
            RecipeManager.remove(id);
            renderFavoriteList(document.getElementById('searchInput').value);
            weui.toast('已删除', 1000);
        });
    };

    // 初始化 WeUI 搜索栏
    weui.searchBar('#searchBar');
    
    // 监听输入事件
    document.getElementById('searchInput').addEventListener('input', function(e) {
        renderFavoriteList(e.target.value.trim());
    });

    document.getElementById('searchClear').addEventListener('click', function() {
        renderFavoriteList('');
    });

    document.getElementById('searchCancel').addEventListener('click', function() {
        renderFavoriteList('');
    });

    function switchTab(tabName) {
        ['home', 'favorite', 'settings'].forEach(name => {
            document.getElementById(`${name}Panel`).style.display = (name === tabName) ? 'block' : 'none';
        });

        const tabs = document.querySelectorAll('.weui-tabbar__item');
        tabs.forEach(tab => tab.classList.remove('weui-bar__item_on'));
        const tabIndex = {'home': 0, 'favorite': 1, 'settings': 2}[tabName];
        tabs[tabIndex].classList.add('weui-bar__item_on');

        if (tabName === 'favorite') {
            document.querySelectorAll('.slide-open').forEach(el => el.classList.remove('slide-open'));
        }
    }
</script>
</body>
</html>
