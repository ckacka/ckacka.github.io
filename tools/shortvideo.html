<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- 解决混合内容问题 -->
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>树洞短视频</title>
    <!-- 使用国内可稳定访问的图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-icons/3.0.1/iconfont/material-icons.min.css">
    <style>
        /* 全局样式重置和响应式基础 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
            background-color: #000;
            color: #fff;
        }
        
        /* 响应式视频播放器容器 */
        .video-player-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            height: 100dvh; /* 移动端兼容 */
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        /* 视频元素响应式适配 */
        .video-element {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background-color: #000;
        }
        
        /* --- 顶部导航栏 (横向滑动优化) --- */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            padding: max(20px, env(safe-area-inset-top)) 16px 15px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
            z-index: 20;
            transition: all 0.3s ease;
        }
        
        .top-bar.hidden {
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none;
        }

        .type-scroll-wrapper {
            flex: 1;
            overflow: hidden;
        }

        .type-scroll-container {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            align-items: center;
            /* 隐藏滚动条 */
            scrollbar-width: none; 
            -ms-overflow-style: none;
        }
        .type-scroll-container::-webkit-scrollbar {
            display: none;
        }

        .type-tab {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            white-space: nowrap;
            cursor: pointer;
            padding: 5px 2px;
            position: relative;
            transition: all 0.2s ease;
        }

        .type-tab.active {
            font-size: 18px;
            color: #fff;
            font-weight: bold;
        }

        .type-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 3px;
            background-color: #fff;
            border-radius: 2px;
        }

        /* --- 右侧互动工具栏 --- */
        .right-sidebar {
            position: absolute;
            right: 12px;
            bottom: 140px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            z-index: 20;
            align-items: center;
            transition: all 0.3s ease;
        }

        .right-sidebar.hidden {
            opacity: 0;
            transform: translateX(20px);
            pointer-events: none;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            cursor: pointer;
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
        }

        .action-btn .icon-bg {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 5px;
            transition: all 0.2s ease;
        }

        .action-btn:active .icon-bg {
            transform: scale(0.9);
        }

        .action-btn .material-icons {
            font-size: 26px;
            transition: color 0.3s;
        }

        .action-text {
            font-size: 12px;
            font-weight: 500;
        }

        /* 视频控制栏 */
        .video-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8) 30%);
            padding: 20px 16px max(20px, env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 15;
            transition: all 0.3s ease;
        }
        
        .video-controls.hidden {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }
        
        .progress-container {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #fff, #ddd);
            border-radius: 2px;
            width: 0%;
            position: relative;
        }
        
        .progress-handle {
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s ease;
            box-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        
        .progress-container:hover .progress-handle {
            opacity: 1;
        }
        
        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .left-controls, .right-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .control-btn {
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }
        
        .control-btn .material-icons {
            font-size: 28px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        
        /* 大播放按钮 */
        .big-play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            width: 64px;
            height: 64px;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.2s ease;
            border: 2px solid rgba(255,255,255,0.1);
        }
        
        .big-play-btn .material-icons {
            font-size: 40px;
        }
        
        .big-play-btn.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(1.2);
        }
        
        /* 加载动画 */
        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 10;
            display: none;
        }
        
        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        /* 提示消息 */
        .hint {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
        }
        
        .hint.show {
            opacity: 1;
        }

        /* 刷新按钮旋转动画 */
        .refresh-icon {
            transition: transform 0.3s;
        }
        .action-btn.loading .refresh-icon {
            animation: rotate 1s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 隐藏浏览器默认控件 */
        video::-webkit-media-controls { display: none !important; }
    </style>
</head>
<body>
    <div class="video-player-container" id="playerContainer">
        <!-- 视频主元素 -->
        <video class="video-element" id="videoElement" preload="metadata" playsinline webkit-playsinline loop>
            您的浏览器不支持视频播放
        </video>
        
        <!-- 大播放/暂停按钮 (屏幕中央) -->
        <div class="big-play-btn hidden" id="bigPlayButton">
            <i class="material-icons">play_arrow</i>
        </div>
        
        <!-- 加载动画 -->
        <div class="loading-spinner" id="loadingSpinner"></div>
        
        <!-- 顶栏：类别横向滑动 -->
        <div class="top-bar" id="topBar">
            <div class="type-scroll-wrapper">
                <div class="type-scroll-container" id="typeScrollContainer">
                    <div class="type-tab active" data-type="jk" data-name="JK视频">JK</div>
                    <div class="type-tab" data-type="YuMeng" data-name="欲梦">欲梦</div>
                    <div class="type-tab" data-type="NvDa" data-name="女大">女大</div>
                    <div class="type-tab" data-type="NvGao" data-name="女高">女高</div>
                    <div class="type-tab" data-type="ReWu" data-name="热舞">热舞</div>
                    <div class="type-tab" data-type="QingCun" data-name="清纯">清纯</div>
                    <div class="type-tab" data-type="YuZu" data-name="玉足">玉足</div>
                    <div class="type-tab" data-type="SheJie" data-name="蛇姐">蛇姐</div>
                    <div class="type-tab" data-type="ChuanDa" data-name="穿搭">穿搭</div>
                    <div class="type-tab" data-type="GaoZhiLiangXiaoJieJie" data-name="高质量">高质量</div>
                    <div class="type-tab" data-type="HanFu" data-name="汉服">汉服</div>
                    <div class="type-tab" data-type="HeiSi" data-name="黑丝">黑丝</div>
                    <div class="type-tab" data-type="BianZhuang" data-name="变装">变装</div>
                    <div class="type-tab" data-type="LuoLi" data-name="萝莉">萝莉</div>
                    <div class="type-tab" data-type="TianMei" data-name="甜妹">甜妹</div>
                    <div class="type-tab" data-type="BaiSi" data-name="白丝">白丝</div>
                </div>
            </div>
        </div>
        
        <!-- 右侧互动边栏 -->
        <div class="right-sidebar" id="rightSidebar">
            <!-- 换一个按钮 -->
            <div class="action-btn" id="refreshBtn">
                <div class="icon-bg">
                    <i class="material-icons refresh-icon">refresh</i>
                </div>
                <span class="action-text">换一个</span>
            </div>
        </div>
        
        <!-- 底部视频控制栏 -->
        <div class="video-controls" id="videoControls">
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-handle"></div>
                </div>
            </div>
            
            <div class="time-display">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
            
            <div class="controls-row">
                <div class="left-controls">
                    <button class="control-btn" id="playPauseBtn" title="播放/暂停">
                        <i class="material-icons" id="playPauseIcon">pause</i>
                    </button>
                    <button class="control-btn" id="muteBtn" title="静音">
                        <i class="material-icons" id="volumeIcon">volume_up</i>
                    </button>
                </div>
                <div class="right-controls">
                    <button class="control-btn fullscreen-btn" id="fullscreenBtn" title="全屏">
                        <i class="material-icons" id="fullscreenIcon">fullscreen</i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 提示弹窗 -->
        <div class="hint" id="hint"></div>
    </div>
    
    <script>
        // API配置
        const API_BASE_URL = 'http://api.mmp.cc/api/ksvideo';
        
        // --- 核心DOM获取 ---
        const videoElement = document.getElementById('videoElement');
        const playerContainer = document.getElementById('playerContainer');
        const bigPlayButton = document.getElementById('bigPlayButton');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const topBar = document.getElementById('topBar');
        const videoControls = document.getElementById('videoControls');
        const rightSidebar = document.getElementById('rightSidebar');
        const hint = document.getElementById('hint');

        // 控制按钮
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playPauseIcon = document.getElementById('playPauseIcon');
        const muteBtn = document.getElementById('muteBtn');
        const volumeIcon = document.getElementById('volumeIcon');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const fullscreenIcon = document.getElementById('fullscreenIcon');
        
        // 进度条
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const currentTimeElement = document.getElementById('currentTime');
        const durationElement = document.getElementById('duration');

        // 顶栏分类与动作
        const typeTabs = document.querySelectorAll('.type-tab');
        const refreshBtn = document.getElementById('refreshBtn');
        
        // --- 状态变量 ---
        let isPlaying = false;
        let isMuted = false;
        let isDraggingProgress = false;
        let currentVideoType = 'jk';
        let currentVideoName = 'JK视频';
        let requestCounter = 0;
        let isRefreshing = false;
        
        // UI自动隐藏逻辑
        let uiHideTimeout = null;
        let uiHidden = false;
        const UI_HIDE_DELAY = 3000;
        
        // --- 初始化 ---
        function init() {
            setupEventListeners();
            // 自动加载第一个视频
            refreshVideo();
        }
        
        // --- 事件监听 ---
        function setupEventListeners() {
            // 视频点击播放/暂停
            playerContainer.addEventListener('click', (e) => {
                if(e.target.closest('.video-controls') || 
                   e.target.closest('.top-bar') || 
                   e.target.closest('.right-sidebar')) {
                    return;
                }
                togglePlayPause();
                showUI();
            });

            // 按钮事件
            playPauseBtn.addEventListener('click', togglePlayPause);
            bigPlayButton.addEventListener('click', togglePlayPause);
            muteBtn.addEventListener('click', toggleMute);
            fullscreenBtn.addEventListener('click', toggleFullscreen);
            refreshBtn.addEventListener('click', refreshVideo);

            // 分类滑动栏点击
            typeTabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    const type = this.dataset.type;
                    const name = this.dataset.name;
                    selectVideoType(this, type, name);
                });
            });

            // 进度条交互
            progressContainer.addEventListener('mousedown', startSeek);
            progressContainer.addEventListener('touchstart', handleTouchSeek, {passive: false});

            // 视频事件
            videoElement.addEventListener('play', () => {
                isPlaying = true;
                updatePlayState();
                resetUIHideTimer();
            });
            videoElement.addEventListener('pause', () => {
                isPlaying = false;
                updatePlayState();
                resetUIHideTimer();
            });
            videoElement.addEventListener('waiting', () => { loadingSpinner.style.display = 'block'; });
            videoElement.addEventListener('playing', () => { loadingSpinner.style.display = 'none'; });
            videoElement.addEventListener('timeupdate', updateProgress);
            videoElement.addEventListener('loadedmetadata', () => {
                durationElement.textContent = formatTime(videoElement.duration);
            });

            // 自动轮播下一个
            videoElement.addEventListener('ended', () => {
                showHint("正在自动播放下一个...");
                setTimeout(refreshVideo, 1000);
            });

            // 鼠标移动/触摸显示UI
            playerContainer.addEventListener('mousemove', showUI);
            playerContainer.addEventListener('touchstart', showUI, {passive: true});
        }
        
        // --- UI 交互控制 ---
        function showUI() {
            if(uiHidden) {
                topBar.classList.remove('hidden');
                videoControls.classList.remove('hidden');
                rightSidebar.classList.remove('hidden');
                uiHidden = false;
            }
            resetUIHideTimer();
        }
        
        function hideUI() {
            if (isDraggingProgress || !isPlaying) {
                resetUIHideTimer();
                return;
            }
            topBar.classList.add('hidden');
            videoControls.classList.add('hidden');
            rightSidebar.classList.add('hidden');
            uiHidden = true;
        }
        
        function resetUIHideTimer() {
            clearTimeout(uiHideTimeout);
            uiHideTimeout = setTimeout(hideUI, UI_HIDE_DELAY);
        }

        // --- 核心播放逻辑 ---
        function togglePlayPause() {
            if (videoElement.paused) {
                videoElement.play().catch(e => console.log("等待用户交互"));
            } else {
                videoElement.pause();
            }
        }

        function updatePlayState() {
            if (isPlaying) {
                playPauseIcon.textContent = 'pause';
                bigPlayButton.classList.add('hidden');
            } else {
                playPauseIcon.textContent = 'play_arrow';
                bigPlayButton.classList.remove('hidden');
            }
        }

        function toggleMute() {
            videoElement.muted = !videoElement.muted;
            isMuted = videoElement.muted;
            volumeIcon.textContent = isMuted ? 'volume_off' : 'volume_up';
            showHint(isMuted ? "已静音" : "取消静音");
        }

        // --- 进度条逻辑 ---
        function startSeek(e) {
            isDraggingProgress = true;
            seekTo(e);
            
            const moveHandler = (moveEvent) => {
                if (isDraggingProgress) seekTo(moveEvent);
            };
            const endHandler = () => {
                isDraggingProgress = false;
                document.removeEventListener('mousemove', moveHandler);
                document.removeEventListener('touchmove', moveHandler);
                document.removeEventListener('mouseup', endHandler);
                document.removeEventListener('touchend', endHandler);
            };
            
            document.addEventListener('mousemove', moveHandler);
            document.addEventListener('touchmove', moveHandler, {passive: false});
            document.addEventListener('mouseup', endHandler);
            document.addEventListener('touchend', endHandler);
        }

        function handleTouchSeek(e) {
            e.preventDefault();
            startSeek(e.touches[0]);
        }

        function seekTo(event) {
            const rect = progressContainer.getBoundingClientRect();
            let clientX = event.clientX !== undefined ? event.clientX : (event.touches ? event.touches[0].clientX : 0);
            const percent = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
            progressBar.style.width = percent * 100 + '%';
            videoElement.currentTime = percent * videoElement.duration;
            currentTimeElement.textContent = formatTime(videoElement.currentTime);
        }

        function updateProgress() {
            if (!isDraggingProgress && videoElement.duration) {
                const percent = (videoElement.currentTime / videoElement.duration) * 100;
                progressBar.style.width = percent + '%';
                currentTimeElement.textContent = formatTime(videoElement.currentTime);
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (playerContainer.requestFullscreen) playerContainer.requestFullscreen();
                else if (playerContainer.webkitRequestFullscreen) playerContainer.webkitRequestFullscreen();
                fullscreenIcon.textContent = 'fullscreen_exit';
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                fullscreenIcon.textContent = 'fullscreen';
            }
        }

        // --- 数据获取与切换 ---
        function selectVideoType(tabElement, type, name) {
            if (currentVideoType === type) return;
            
            typeTabs.forEach(t => t.classList.remove('active'));
            tabElement.classList.add('active');
            tabElement.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            
            currentVideoType = type;
            currentVideoName = name;
            refreshVideo();
        }

        async function fetchFreshVideoUrl(type, customCounter = null) {
            const counter = customCounter || requestCounter;
            const t = Date.now();
            const r = Math.random().toString(36).substring(7);
            
            const jsonApiUrl = `${API_BASE_URL}?type=json&id=${type}&_t=${t}_${counter}_${r}`;
            
            try {
                const response = await fetch(jsonApiUrl);
                const data = await response.json();
                
                let freshUrl = '';
                if (data && data.url) freshUrl = data.url;
                else if (data && data.video_url) freshUrl = data.video_url;
                else if (data && data.data && data.data.url) freshUrl = data.data.url;
                
                if (freshUrl) return freshUrl;
                throw new Error("无法从JSON解析到有效URL");
            } catch (e) {
                console.warn("JSON解析失败，尝试回退到直连格式:", e);
                return `${API_BASE_URL}?type=mp4&id=${type}&_t=${t}_${counter}`;
            }
        }

        async function refreshVideo() {
            if (isRefreshing) return;
            isRefreshing = true;
            refreshBtn.classList.add('loading');
            loadingSpinner.style.display = 'block';
            requestCounter++;
            
            try {
                const freshUrl = await fetchFreshVideoUrl(currentVideoType);
                playVideoUrl(freshUrl);
            } catch (error) {
                showHint("获取视频失败，请重试");
            } finally {
                setTimeout(() => {
                    refreshBtn.classList.remove('loading');
                    isRefreshing = false;
                }, 500);
            }
        }

        function playVideoUrl(url) {
            loadingSpinner.style.display = 'block';
            videoElement.src = url;
            videoElement.load();
            videoElement.play().catch(() => {
                bigPlayButton.classList.remove('hidden');
            });
        }

        function showHint(msg) {
            hint.textContent = msg;
            hint.classList.add('show');
            setTimeout(() => hint.classList.remove('show'), 2000);
        }

        // 启动
        init();
    </script>
</body>
</html>
