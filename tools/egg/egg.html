<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>I got lost.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #ad-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 初始播放遮罩层 */
        #play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
        }

        .play-icon {
            width: 80px;
            height: 80px;
            fill: white;
            opacity: 0.8;
            transition: transform 0.2s, opacity 0.2s;
        }

        #play-overlay:hover .play-icon {
            transform: scale(1.1);
            opacity: 1;
        }

        #skip-btn {
            position: absolute;
            top: 40px;
            right: 20px;
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 10;
            display: none; 
            pointer-events: none;
            user-select: none;
            backdrop-filter: blur(4px);
            transition: background 0.3s;
        }

        #skip-btn.clickable {
            pointer-events: auto;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.7);
        }

        #spinner-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            display: none; /* 初始由遮罩层替代，播放后如果缓冲再显示 */
        }

        .ios-spinner {
            width: 48px;
            height: 48px;
            animation: ios-spin 1s steps(12, end) infinite;
        }

        @keyframes ios-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="video-container">
    <video id="ad-video" src="https://ckacka.github.io/tools/egg/egg.mp4" loop playsinline></video>
    
    <div id="play-overlay">
        <svg class="play-icon" viewBox="0 0 24 24">
            <path d="M8 5v14l11-7z"/>
        </svg>
    </div>

    <div id="skip-btn">15 s</div>

    <div id="spinner-container">
        <svg class="ios-spinner" viewBox="0 0 100 100">
            <g stroke="#ffffff" stroke-width="8" stroke-linecap="round">
                <line x1="50" y1="10" x2="50" y2="25" opacity="1" />
                <line x1="50" y1="10" x2="50" y2="25" transform="rotate(30 50 50)" opacity="0.91" />
                <line x1="50" y1="10" x2="50" y2="25" transform="rotate(60 50 50)" opacity="0.83" />
                <line x1="50" y1="10" x2="50" y2="25" transform="rotate(90 50 50)" opacity="0.75" />
                <line x1="50" y1="10" x2="50" y2="25" transform="rotate(120 50 50)" opacity="0.66" />
                <line x1="50" y1="10" x2="50" y2="25" transform="rotate(150 50 50)" opacity="0.58" />
                <line x1="50" y1="10" x2="50" y2="25" transform="rotate(180 50 50)" opacity="0.5" />
                <line x1="50" y1="10" x2="50" y2="25" transform="rotate(210 50 50)" opacity="0.41" />
                <line x1="50" y1="10" x2="50" y2="25" transform="rotate(240 50 50)" opacity="0.33" />
                <line x1="50" y1="10" x2="50" y2="25" transform="rotate(270 50 50)" opacity="0.25" />
                <line x1="50" y1="10" x2="50" y2="25" transform="rotate(300 50 50)" opacity="0.16" />
                <line x1="50" y1="10" x2="50" y2="25" transform="rotate(330 50 50)" opacity="0.08" />
            </g>
        </svg>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const video = document.getElementById('ad-video');
        const playOverlay = document.getElementById('play-overlay');
        const skipBtn = document.getElementById('skip-btn');
        const spinner = document.getElementById('spinner-container');
        
        let timeLeft = 15;
        let timerStarted = false;
        let countdownInterval;

        const targetUrl = 'https://ckacka.github.io/';

        // 点击遮罩层开始播放
        playOverlay.addEventListener('click', () => {
            playOverlay.style.display = 'none'; // 隐藏遮罩
            video.muted = false; // 确保不静音
            video.play().catch(e => {
                console.error("播放失败:", e);
                // 如果还失败，通常是设备策略极其严格，可能需要再次引导
            });
        });

        function redirect() {
            window.location.href = targetUrl;
        }

        video.addEventListener('playing', () => {
            if (!timerStarted) {
                timerStarted = true;
                spinner.style.display = 'none';
                skipBtn.style.display = 'block';
                skipBtn.innerText = `${timeLeft} s`;

                countdownInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft > 0) {
                        skipBtn.innerText = `${timeLeft} s`;
                    } else {
                        clearInterval(countdownInterval);
                        skipBtn.innerText = '跳过';
                        skipBtn.classList.add('clickable');
                    }
                }, 1000);
            }
        });

        // 缓冲处理：如果视频卡住，显示加载动画
        video.addEventListener('waiting', () => {
            if (timerStarted) spinner.style.display = 'flex';
        });

        video.addEventListener('canplay', () => {
            spinner.style.display = 'none';
        });

        skipBtn.addEventListener('click', () => {
            if (skipBtn.classList.contains('clickable')) {
                redirect();
            }
        });
    });
</script>

</body>
</html>
